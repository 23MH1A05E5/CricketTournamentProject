<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>All Matches</title></head>
<body>
<h2>All Matches (Grouped by Batch)</h2>

<div th:each="batch, iterStat : ${batches}">
    <h3 th:text="'Batch ' + ${iterStat.index + 1}"></h3>
    <table border="1">
        <tr>
            <th>ID</th>
            <th>Team 1</th>
            <th>Team 2</th>
            <th>Score 1</th>
            <th>Score 2</th>
            <th>Winner</th>
        </tr>
        <tr th:each="match : ${batch}">
            <td th:text="${match.id}"></td>
            <td th:text="${match.team1}"></td>
            <td th:text="${match.team2}"></td>
            <td th:text="${match.team1Score}"></td>
            <td th:text="${match.team2Score}"></td>
            <td th:text="${match.winner}"></td>
        </tr>
    </table>
</div>

<p><a href="/">Back to Dashboard</a></p>

</body>
</html>
